name: Android CI/CD

on:
  push:
    branches: [ main, develop, release/* ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify gradle wrapper
        run: |
          echo "=== Java version ==="
          java -version 2>&1
          echo "=== Gradle wrapper JAR ==="
          ls -la gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar
          unzip -l gradle/wrapper/gradle-wrapper.jar | grep GradleWrapperMain || echo "WARNING: GradleWrapperMain NOT FOUND!"
          echo "=== Gradle wrapper properties ==="
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tester-app-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload shared module
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-module
          path: shared/build/
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace --no-daemon

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lint --stacktrace --no-daemon

      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports
          path: androidApp/build/reports/lint-results-*.html
          retention-days: 7

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: [build, test, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: tester-app-release-apk-${{ github.ref_name }}
          path: androidApp/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: androidApp/build/outputs/apk/release/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
